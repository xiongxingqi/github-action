name: 打包React项目
on: push

permissions:
  contents: write

jobs:
  npm-build:
    name: npm-build工作
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目
        uses: actions/checkout@v6
      - run: pwd
      - run: npm --version
      - name: 安装依赖
        run: npm install && npm run build
      - name: 部署
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
